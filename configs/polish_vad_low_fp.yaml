task: "vad"
model_name: "vad_pl_low_fp"
wake_word: "vad"

positive_dataset_paths:
  - "data/bigos"
  - "data/fleurs_pl"
  - "data/common_voice_pl"
  - "data/mc_speech"
  - "data/pl_speech"
positive_file_pattern: "**/*.wav"

bootstrap_speech_datasets:
  - kind: "bigos"
    enabled: true
    optional: true
    output_dir: "data/bigos"
    hf_config: "all"
    split: "train"
    max_clips: 2000
  - kind: "fleurs"
    enabled: true
    optional: false
    output_dir: "data/fleurs_pl"
    hf_config: "pl_pl"
    split: "train+validation"
    max_clips: 1500
  - kind: "common_voice"
    enabled: true
    optional: true
    output_dir: "data/common_voice_pl"
    hf_config: "pl"
    split: "train+validation"
    max_clips: 1500

include_default_background_subsets: true
background_audio_paths:
  - "data/audioset_nonspeech"

bootstrap_background_datasets:
  - kind: "hf_audio"
    enabled: false
    optional: true
    hf_repo: "AxonData/speech-free-background-noise"
    output_dir: "data/speech_free_background_noise"
    split: "train"
    max_clips: 1000
    prefix: "speech_free_bg"
    segment_duration_s: 5.0
    segment_overlap_s: 2.5
    min_segment_duration_s: 4.0
  - kind: "hf_audio"
    enabled: true
    optional: true
    hf_repo: "bond005/audioset-nonspeech"
    output_dir: "data/audioset_nonspeech"
    split: "train"
    max_clips: 1000
    prefix: "audioset_nonspeech"

negative_feature_sets:
  - "speech"
  - "dinner_party"
  - "no_speech"
  - "dinner_party_eval"

asset_subsets:
  audioset_max_clips: 300
  fma_max_clips: 200
  io_workers: 8

runtime:
  device: "cpu"
  allow_cpu_fallback: true
  disable_xla_auto_jit: true
  xla_gpu_strict_conv_algorithm_picker: false
  tf_enable_onednn_opts: true
  intra_op_threads: 8
  inter_op_threads: 2

negative_feature_weights:
  speech: 10.0
  dinner_party: 14.0
  no_speech: 10.0
  dinner_party_eval: 0.0

negative_feature_truncation:
  speech: "random"
  dinner_party: "random"
  no_speech: "random"
  dinner_party_eval: "split"

positive_sampling_weight: 2.0
positive_truncation_strategy: "truncate_start"
remove_silence: false
random_split_seed: 10
split_count: 0.1

augmentation:
  duration_s: 3.2
  background_min_snr_db: -2
  background_max_snr_db: 12
  min_jitter_s: 0.195
  max_jitter_s: 0.205
  probabilities:
    SevenBandParametricEQ: 0.08
    TanhDistortion: 0.08
    PitchShift: 0.05
    BandStopFilter: 0.08
    AddColorNoise: 0.08
    AddBackgroundNoise: 0.75
    Gain: 1.0
    GainTransition: 0.25
    RIR: 0.45

training:
  train_dir: "output/vad_pl_low_fp/trained_model"
  training_steps: [3000, 3000, 4000]
  learning_rates: [0.001, 0.0003, 0.0001]
  positive_class_weight: [1.5]
  negative_class_weight: [18]
  batch_size: 256
  eval_step_interval: 1000
  clip_duration_ms: 1500
  minimization_metric: null
  target_minimization: 0.9
  maximization_metric: "average_viable_recall"
  time_mask_max_size: [0]
  time_mask_count: [0]
  freq_mask_max_size: [0]
  freq_mask_count: [0]

esphome_manifest:
  probability_cutoff: 0.5
  sliding_window_size: 5
  tensor_arena_size: 16772
  feature_step_size: 10
  minimum_esphome_version: "2024.7.0"
  trained_languages: ["pl"]
  author: "ha-wakeword-trainer"
  website: "https://github.com/lukcz/ha-wakeword-trainer"
